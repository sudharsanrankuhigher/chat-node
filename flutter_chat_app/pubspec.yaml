name: flutter_chat_app
description: Flutter chat and WebRTC client using Stacked architecture.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  get_it: ^8.0.3
  stacked: ^3.4.4
  stacked_services: ^1.6.0
  socket_io_client: ^3.1.2
  flutter_webrtc: ^0.14.2

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  stacked_generator: ^1.6.1

flutter:
  uses-material-design: true
